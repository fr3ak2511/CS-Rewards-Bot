name: CS Hub Rewards Claimer

on:
  # Triggers every 3 hours, shifted 5 min so the first run of the day
  # always lands at 05:35 AM IST (game server boots at 05:30 AM IST).
  #
  #   UTC 00:05 = IST 05:35  ← Primary Run
  #   UTC 03:05 = IST 08:35  ← Backup Run #1
  #   UTC 06:05 = IST 11:35  ← Backup Run #2
  #   UTC 09:05 = IST 14:35  ← Backup Run #3
  #   UTC 12:05 = IST 17:35  ← Backup Run #4
  #   UTC 15:05 = IST 20:35  ← Backup Run #5
  #   UTC 18:05 = IST 23:35  ← Backup Run #6
  #   UTC 21:05 = IST 02:35  ← Backup Run #7
  #
  # Each job does ONE clean pass and exits — no internal sleep loop.
  # Backup runs smart-skip IDs where all rewards are already on cooldown.
  schedule:
    - cron: '5 0/3 * * *'
  workflow_dispatch:

concurrency:
  group: rewards-claimer
  cancel-in-progress: true

jobs:
  run-claimer:
    runs-on: ubuntu-latest
    timeout-minutes: 45     # One clean pass — 25 IDs × ~1 min each + buffer

    permissions:
      contents: write       # Required for the commit-back step

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Checkout the branch that triggered the run so the commit-back
          # step can push directly to it without a detached-HEAD conflict.
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Master Claimer
        env:
          # Supports both original secret names and SMTP_* aliases
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SENDER_EMAIL:       ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_SERVER:        ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME:      ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD:      ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM:          ${{ secrets.SMTP_FROM }}
          SMTP_TO:            ${{ secrets.SMTP_TO }}
        run: python master_claimer.py

      - name: Commit State Files
        # Persists claim_history.json and bot_meta.json back to the repo
        # so streak, last-run deltas, and new-ID tracking survive between runs.
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "bot: update claim history and meta [skip ci]"
          file_pattern: "claim_history.json bot_meta.json"

      - name: Upload Debug Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            *.png
            *.html
          retention-days: 1
