name: CS Hub Rewards Claimer

on:
  schedule:
    # Primary Run: 05:35 AM IST (00:05 UTC)
    - cron: '5 0 * * *'
    # Backup Runs: Every 3 hours (UTC)
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allows manual runs

jobs:
  run-claimer:
    runs-on: ubuntu-latest
    permissions:
      contents: write # CRITICAL: Allows the bot to push the streak update back to GitHub
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Upgraded to v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Upgraded to v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Master Claimer
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Suppresses the Node.js 20 deprecation warning
        run: python master_claimer.py

      - name: Commit state changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add bot_meta.json claim_history.json
          git commit -m "Automated state update: Streak and Claim History" || echo "No changes to commit"
          git push
