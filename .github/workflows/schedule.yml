name: CS Hub Rewards Claimer

on:
  # Triggers every 3 hours, shifted 5 min so the first run of the day
  # always lands at 05:35 AM IST (game server boots at 05:30 AM IST).
  #
  #   UTC 00:05 = IST 05:35  ← Primary Run
  #   UTC 03:05 = IST 08:35  ← Backup Run #1
  #   UTC 06:05 = IST 11:35  ← Backup Run #2
  #   UTC 09:05 = IST 14:35  ← Backup Run #3
  #   UTC 12:05 = IST 17:35  ← Backup Run #4
  #   UTC 15:05 = IST 20:35  ← Backup Run #5
  #   UTC 18:05 = IST 23:35  ← Backup Run #6
  #   UTC 21:05 = IST 02:35  ← Backup Run #7
  #
  # Each job does ONE clean pass and exits — no internal sleep loop.
  # Backup runs smart-skip IDs where all rewards are already on cooldown.
  schedule:
    - cron: '5 0/3 * * *'
  workflow_dispatch:

concurrency:
  group: rewards-claimer
  # false = let the running job finish before starting the next one.
  # Previously true — if a job ran 44+ min it would get cancelled exactly
  # when the primary run (UTC 00:05) tried to start, causing primary misses.
  cancel-in-progress: false

jobs:
  run-claimer:
    runs-on: ubuntu-latest
    # Raised from 45 → 60 min. Previous 45-min ceiling was too close to the
    # observed 44-min runtime, causing timeouts and primary run interference.
    timeout-minutes: 60

    permissions:
      contents: write       # Required for the commit-back step

    env:
      # Force Node.js 24 for all actions — suppresses Node.js 20 deprecation
      # warnings and improves scheduler reliability on GitHub-hosted runners.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Master Claimer
        env:
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: 465
          SMTP_USERNAME: ${{ secrets.SENDER_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SENDER_EMAIL }}
          SMTP_TO: ${{ secrets.RECIPIENT_EMAIL }}
        run: python master_claimer.py

      - name: Commit State Files
        # Persists claim_history.json and bot_meta.json back to the repo
        # so streak, last-run deltas, and new-ID tracking survive between runs.
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "bot: update claim history and meta [skip ci]"
          file_pattern: "claim_history.json bot_meta.json"

      - name: Upload Debug Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            *.png
            *.html
          retention-days: 1
