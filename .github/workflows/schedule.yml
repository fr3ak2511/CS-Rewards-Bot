name: Daily Hub Rewards Claim

on:
  schedule:
    # Runs at 00:05 UTC every day, which is exactly 5:35 AM IST
    - cron: '5 0 * * *'
  workflow_dispatch: # Allows you to manually trigger the script from the GitHub Actions tab

jobs:
  claim-rewards:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Master Claimer
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: python master_claimer.py

    - name: Commit and push updated claim history
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add claim_history.json
        # Only commit if there are changes to avoid workflow errors
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update claim history [skip ci]" && git push)
