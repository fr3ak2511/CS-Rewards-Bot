name: Hourly Rewards Claimer

on:
  # FIX #1: Cron shifted from '0 */2' to '5 */2' (UTC+5min = IST+5min).
  # This starts the first cycle at 05:35 AM IST instead of 05:30 AM IST,
  # giving the game server ~2-3 min boot time after its 05:30 daily reset
  # before the script attempts to claim daily rewards.
  #
  # Updated UTC → IST mapping (UTC+5:30):
  #   UTC 00:05 = IST 05:35
  #   UTC 02:05 = IST 07:35
  #   UTC 04:05 = IST 09:35
  #   UTC 06:05 = IST 11:35
  #   UTC 08:05 = IST 13:35
  #   UTC 10:05 = IST 15:35
  #   UTC 12:05 = IST 17:35
  #   UTC 14:05 = IST 19:35
  #   UTC 16:05 = IST 21:35
  #   UTC 18:05 = IST 23:35
  #   UTC 20:05 = IST 01:35
  #   UTC 22:05 = IST 03:35
  #
  # Max wait for any unclaimed reward = 2h (the script sleeps internally
  # so actual claim happens within 90s of a reward becoming available).
  # concurrency cancel-in-progress handles overlap if a job runs long.
  schedule:
    - cron: '5 */2 * * *'
  workflow_dispatch:

concurrency:
  group: rewards-claimer
  cancel-in-progress: true

jobs:
  run-claimer:
    runs-on: ubuntu-latest
    timeout-minutes: 130     # 2h 10min — slightly over the 2h trigger interval so sleeping jobs get replaced cleanly

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Master Claimer
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python master_claimer.py

      - name: Upload Debug Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-data
          path: |
            *.png
            *.html
          retention-days: 1
