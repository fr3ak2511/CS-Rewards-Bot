name: CS Hub Rewards Claimer

on:
  schedule:
    # Runs at 05:35 AM IST (00:05 UTC) every day
    - cron: '5 0 * * *'
  workflow_dispatch: # Allows you to manually trigger the script from GitHub

jobs:
  run-claimer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Master Claimer
        env:
          # Ensure your GitHub Secrets are mapped correctly here
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python master_claimer.py

      - name: Commit state changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add bot_meta.json claim_history.json
          git commit -m "Automated state update: Streak and Claim History" || echo "No changes to commit"
          git push
